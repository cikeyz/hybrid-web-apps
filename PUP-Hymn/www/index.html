<!doctype html>
<html lang="en">
    <head>
        <!-- Keeping UTF-8 here so Filipino characters and symbols show up properly -->
        <meta charset="UTF-8" />

        <!-- Standard responsive viewport so the layout behaves on phones too -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>PUP Hymn</title>

        <!-- Small PUP logo that appears on the browser tab.
             Path uses lowercase "assets/" so it resolves on Android's
             case-sensitive WebView filesystem too. -->
        <link rel="icon" type="image/svg+xml" href="assets/PUP-Logo.svg" />

        <!-- Montserrat is vendored locally (woff2 in assets/montserrat/)
             instead of loaded from Google Fonts, so the look is identical
             inside the APK with no network connection. -->
        <link rel="stylesheet" href="assets/montserrat/montserrat.css" />

        <!-- Phosphor Icons are vendored locally too. The page uses both
             the regular (.ph) and fill (.ph-fill) variants, so both
             stylesheets are included. Without these, the play/pause and
             seek buttons would render as empty boxes. -->
        <link rel="stylesheet" href="assets/phosphor/regular.css" />
        <link rel="stylesheet" href="assets/phosphor/fill.css" />

        <!-- Main stylesheet for the page layout, colors, and component styling -->
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <!-- ----- TOP HEADER BAR -----
       This is the maroon header strip with the PUP branding.
       It stays at the top so the page keeps that app-like layout. -->
        <header class="topbar">
            <!-- Left side holds the logo and the school name -->
            <div class="topbar-brand">
                <!-- SVG keeps the logo sharp even if the size changes -->
                <img
                    src="assets/PUP-Logo.svg"
                    alt="PUP Logo"
                    class="topbar-logo"
                />

                <!-- School name and tagline are stacked here -->
                <div class="topbar-text">
                    <span class="topbar-title"
                        >Polytechnic University of the Philippines</span
                    >
                    <span class="topbar-sub"
                        >The Country's 1st PolytechnicU</span
                    >
                </div>
            </div>
        </header>

        <!-- ----- MAIN PLAYER AREA -----
         Main split layout: sidebar on the left, lyrics area on the right. -->
        <main class="player">
            <!-- ----- LEFT SIDEBAR -----
         This side shows the cover image, song details, and hymn info card.
         Flexbox keeps the content centered nicely. -->
            <aside class="sidebar">
                <!-- Album area uses the PUP Pylon image.
           object-fit: cover helps it fill the box without looking stretched -->
                <div class="album-art">
                    <img
                        src="assets/PUP-Pylon.jpg"
                        alt="PUP Pylon Monument"
                        class="album-img"
                    />
                </div>

                <!-- Basic song info -->
                <h2 class="song-title">Imno ng PUP</h2>
                <p class="song-artist">PUP Hymn · 1986</p>

                <!-- Extra info card for the composers and performing group -->
                <div class="hymn-info">
                    <h3 class="info-heading">About the Hymn</h3>

                    <!-- First row lists the composers -->
                    <div class="info-row">
                        <span class="info-label">Composers</span>
                        <span class="info-value">Prof. Siegfredo Calabig</span>
                        <span class="info-value">Prof. Susan Roldan</span>
                        <span class="info-value">Mr. Rafael Amaranto</span>
                    </div>

                    <!-- Second row shows the performing ensemble -->
                    <div class="info-row">
                        <span class="info-label">Ensemble</span>
                        <span class="info-value">Banda Kawayan Pilipinas</span>
                    </div>
                </div>
            </aside>

            <!-- ----- RIGHT LYRICS PANEL -----
         The lyrics get inserted here by script.js.
         Until playback starts, this just shows the placeholder text. -->
            <section class="lyrics-panel" id="lyricsPanel">
                <p class="lyrics-placeholder">Press play to begin</p>
            </section>
        </main>

        <!-- ----- BOTTOM CONTROLS BAR -----
       Bottom area for the audio element, playback buttons,
       and the progress bar with time labels. -->
        <div class="controls-bar">
            <!-- Audio element for the hymn track.
         preload="metadata" gets the duration first without loading everything early -->
            <audio
                id="audio"
                src="assets/PUP-Hymn.mp3"
                preload="metadata"
            ></audio>

            <!-- Rewind button jumps back by 5 seconds -->
            <button
                type="button"
                class="control-btn"
                id="rewind-btn"
                title="Rewind 5s"
                aria-label="Rewind 5 seconds"
            >
                <i class="ph ph-rewind"></i>
            </button>

            <!-- Main play/pause button.
         JavaScript swaps which icon is visible depending on the audio state. -->
            <button
                type="button"
                class="play-btn"
                id="playBtn"
                aria-label="Play or Pause"
            >
                <!-- Show this icon while the audio is paused -->
                <i class="ph-fill ph-play icon-play" id="iconPlay"></i>
                <!-- Show this icon while the audio is already playing -->
                <i
                    class="ph-fill ph-pause icon-pause"
                    id="iconPause"
                    style="display: none"
                ></i>
            </button>

            <!-- Forward button jumps ahead by 5 seconds -->
            <button
                type="button"
                class="control-btn"
                id="forward-btn"
                title="Forward 5s"
                aria-label="Forward 5 seconds"
            >
                <i class="ph ph-fast-forward"></i>
            </button>

            <!-- Progress area holds current time, the seek bar, and total duration -->
            <div class="progress-wrapper">
                <!-- Current playback time updates while the song is running -->
                <span class="time-label" id="timeCurrent">00:00</span>

                <!-- Click anywhere on this bar to seek.
           The fill inside it grows based on how much of the song has played. -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <!-- Total duration gets set once the audio metadata is loaded -->
                <span class="time-label" id="timeTotal">0:00</span>
            </div>
        </div>

        <!-- cordova.js is injected by Cordova at build time and exposes the
             native bridge used by the status bar and media-notification
             plugins. In a plain browser (XAMPP preview) the request 404s
             harmlessly and script.js falls back to no-op behavior. -->
        <script src="cordova.js"></script>

        <!-- Main JavaScript file for parsing lyrics, syncing highlights, and handling controls -->
        <script src="script.js"></script>
    </body>
</html>
